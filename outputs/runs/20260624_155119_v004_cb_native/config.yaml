catboost:
  cat_features:
  - 8
  - 9
  depth: 6
  iterations: 250
  l2_leaf_reg: 3
  learning_rate: 0.05
  random_seed: 42
  verbose: 0
competition:
  classes:
  - GALAXY
  - STAR
  - QSO
  metric: balanced_accuracy
  name: playground-series-s6e6
  target: class
  url: https://www.kaggle.com/competitions/playground-series-s6e6
cv:
  n_splits: 3
  random_state: 42
  shuffle: true
features:
  cat_cols:
  - spectral_type
  - galaxy_population
  color_pairs:
  - - u
    - g
  - - g
    - r
  - - r
    - i
  - - i
    - z
  drop_cols:
  - id
  - obj_ID
  - run_ID
  - rerun_ID
  - cam_col
  - field_ID
  - spec_obj_ID
  - fiber_ID
  - plate
  - MJD
  encoding: label
lgbm:
  colsample_bytree: 0.8
  learning_rate: 0.05
  max_depth: -1
  min_child_samples: 20
  n_estimators: 250
  n_jobs: -1
  num_leaves: 63
  random_state: 42
  reg_alpha: 0.1
  reg_lambda: 0.1
  subsample: 0.8
  verbose: -1
meta:
  max_iter: 1000
  random_state: 42
paths:
  data: data/
  models: models/
  outputs: outputs/
  submissions: outputs/submissions/
xgb:
  colsample_bytree: 0.8
  eval_metric: mlogloss
  learning_rate: 0.05
  max_depth: 6
  n_estimators: 250
  n_jobs: -1
  random_state: 42
  reg_alpha: 0.1
  reg_lambda: 1.0
  subsample: 0.8
