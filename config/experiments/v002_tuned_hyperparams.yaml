competition:
  name: playground-series-s6e6
  url: https://www.kaggle.com/competitions/playground-series-s6e6
  metric: balanced_accuracy
  target: class
  classes:
    - GALAXY
    - STAR
    - QSO

paths:
  data: data/
  outputs: outputs/
  submissions: outputs/submissions/
  models: models/

features:
  drop_cols:
    - id
    - obj_ID
    - run_ID
    - rerun_ID
    - cam_col
    - field_ID
    - spec_obj_ID
    - fiber_ID
    - plate
    - MJD
  color_pairs:
    - [u, g]
    - [g, r]
    - [r, i]
    - [i, z]
  cat_cols:
    - spectral_type
    - galaxy_population

cv:
  n_splits: 3
  shuffle: true
  random_state: 42

lgbm:
  n_estimators: 500
  learning_rate: 0.03
  num_leaves: 63
  max_depth: 8
  min_child_samples: 50
  subsample: 0.7
  colsample_bytree: 0.7
  reg_alpha: 0.5
  reg_lambda: 0.5
  min_split_gain: 0.01
  random_state: 42
  n_jobs: -1
  verbose: -1

xgb:
  n_estimators: 500
  learning_rate: 0.03
  max_depth: 8
  min_child_weight: 5
  subsample: 0.7
  colsample_bytree: 0.7
  reg_alpha: 0.5
  reg_lambda: 2.0
  gamma: 0.1
  eval_metric: mlogloss
  random_state: 42
  n_jobs: -1

catboost:
  iterations: 500
  learning_rate: 0.03
  depth: 8
  l2_leaf_reg: 5
  random_strength: 1
  bagging_temperature: 0.5
  random_seed: 42
  verbose: 0

meta:
  max_iter: 2000
  random_state: 42
  C: 0.5
